<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Sort Visualizer</title>
</head>
<body>
    <div class="container">
        <h1>Selection Sort Visualizer</h1>
        <div class="controls">
            <button id="generateBtn">
                Generate Array
            </button>
            <button id="startBtn">
                Start
            </button>
            <button id="nextBtn">
                Next Step
            </button>
            <button id="pauseBtn">
                Pause
            </button>
            <button id="resetBtn">
                Reset
            </button>
            <div class="speedBox">
                <label for="speedRange">
                    Speed
                </label>

                <input 
                type="range"
                id="speedRange"
                min="100"
                max="1000"
                step="100"
                value="500">
            </div>
        </div>

        
    </div>

</body>
</html>
