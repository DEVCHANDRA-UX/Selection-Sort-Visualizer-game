<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Sort Visualizer</title>
</head>
<body>
    <div class="container">
        <h1>Selection Sort Visualizer</h1>
        <div class="controls">
            <button id="generateBtn">
                Generate Array
            </button>
            <button id="startBtn">
                Start
            </button>
            <button id="nextBtn">
                Next Step
            </button>
            <button id="pauseBtn">
                Pause
            </button>
            <button id="resetBtn">
                Reset
            </button>
            <div class="speedBox">
                <label for="speedRange">
                    Speed
                </label>

                <input 
                type="range"
                id="speedRange"
                min="100"
                max="1000"
                step="100"
                value="500">
            </div>
        </div>

        <div class="stats">
            <div class="card">
                <h3>Comparisons</h3>
                <p id="comparisonCount">0</p>
            </div>

            <div class="card">
                <h3>Swaps</h3>
                <p id="swapCount">0</p>
            </div>

            <div class="card">
                <h3>Current pass</h3>
                <p id="passCount">0</p>
            </div>
        </div>

        <div id="arrayContainer"></div>

        <div class="Legen">

            <div>
                <span class="boxBlue"></span>
                Unsorted
            </div>

            <div>
                <span class="boxYellow"></span>
                Current Element
            </div>

            <div>
                <span class="boxRed"></span>
                Current Minimum
            </div>

            <div>
                <span class="boxGreen"></span>
                Sorted
            </div>
        </div>
        
        <div class="message">
            <h2>Explanation</h2>

            <p id="statusText">
                Click "Generate Array" to begin.
            </p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
